name: CI

on:
  push:
    branches:
      - main
      - master
      - refactor/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Run smoke verification
        run: npm test

      - name: Build package
        run: npm run build

      - name: Check publish tarball
        run: npm pack --dry-run
