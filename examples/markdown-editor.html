<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dompdf.js Markdown 多主题编辑器示例</title>
  <!-- Vditor styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor/dist/index.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    @font-face {
      font-family: "SourceHanSansSC-Regular";
      src: url("./SourceHanSansSC-Regular.ttf") format("truetype");
      font-display: swap;
      font-weight: 400;
      font-style: normal;
    }

    :root {
      color-scheme: light;
      --bg-app: #f8fafc;
      --bg-panel: #ffffff;
      --border-color: #e2e8f0;

      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eeebff;

      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;

      --danger: #ef4444;

      --editor-bg: #fafafa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: 'Inter', "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .app-header {
      height: 56px;
      background-color: #ffffff;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.01em;
    }

    .logo svg {
      width: 22px;
      height: 22px;
    }

    .divider {
      width: 1px;
      height: 18px;
      background-color: var(--border-color);
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-title h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 6px;
      background-color: #f1f5f9;
      padding: 4px 10px;
      border-radius: 9999px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #22c55e;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
      animation: pulse 2s infinite;
    }

    .status-dot.danger {
      background-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
      animation: pulse-danger 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }
    }

    @keyframes pulse-danger {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .status-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Buttons */
    .btn {
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: #ffffff;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background-color: #f8fafc;
      border-color: #cbd5e1;
    }

    .btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .btn-primary {
      background-color: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-icon-only {
      width: 34px;
      padding: 0;
    }

    .btn-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    /* Workspace Container */
    .workspace-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar styling */
    .sidebar {
      width: 300px;
      background-color: #ffffff;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar.collapsed {
      width: 0;
      border-right-width: 0;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-section {
      padding: 18px;
      border-bottom: 1px solid var(--border-color);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    /* Inputs & Selects */
    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: #ffffff;
      color: var(--text-main);
      outline: none;
      transition: all 0.15s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .input-with-button {
      display: flex;
      gap: 8px;
    }

    .input-with-button select {
      flex: 1;
    }

    /* Toggle switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #e2e8f0;
      transition: .2s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    .switch input:checked+.slider {
      background-color: var(--primary);
    }

    .switch input:checked+.slider:before {
      transform: translateX(14px);
    }

    /* Checkbox item */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      cursor: pointer;
      accent-color: var(--primary);
    }

    .checkbox-item span {
      font-size: 12px;
      color: var(--text-main);
      user-select: none;
    }

    /* File upload styling */
    .file-upload-wrapper {
      position: relative;
    }

    .file-upload-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      height: 34px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: #ffffff;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }

    .file-upload-label:hover {
      background-color: #f8fafc;
      border-color: #cbd5e1;
    }

    .upload-icon {
      width: 14px;
      height: 14px;
    }

    /* Disabled panel content */
    .settings-panel-content {
      transition: all 0.25s ease;
      margin-top: 10px;
    }

    .settings-panel-content.is-disabled {
      opacity: 0.45;
      pointer-events: none;
      user-select: none;
    }

    .settings-panel-content.is-disabled input,
    .settings-panel-content.is-disabled select,
    .settings-panel-content.is-disabled label {
      cursor: not-allowed;
    }

    /* Conditionally show text/image fields */
    .watermark-text-only,
    .watermark-image-only {
      display: none;
    }

    #watermark-panel.mode-text .watermark-text-only {
      display: block;
    }

    #watermark-panel.mode-text .form-row.watermark-text-only {
      display: flex;
    }

    #watermark-panel.mode-image .watermark-image-only {
      display: block;
    }

    #watermark-panel.mode-image .form-row.watermark-image-only {
      display: flex;
    }

    /* Main content */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-panel {
      flex: 1;
      border-right: 1px solid var(--border-color);
      background-color: var(--editor-bg);
    }

    .preview-panel {
      flex: 1.1;
      background-color: #f1f5f9;
    }

    .panel-header {
      height: 44px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      background-color: #ffffff;
      flex-shrink: 0;
    }

    .panel-title-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-icon {
      width: 15px;
      height: 15px;
      color: var(--text-muted);
    }

    .panel-title-group h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    .panel-stats {
      display: flex;
      gap: 6px;
    }

    .stat-badge {
      font-size: 11px;
      color: var(--text-muted);
      background-color: #f1f5f9;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .textarea-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: var(--editor-bg);
    }

    /* Vditor Borderless Custom Overrides */
    .vditor {
      border: none !important;
      background-color: var(--editor-bg) !important;
    }

    .vditor-toolbar {
      border-bottom: 1px solid var(--border-color) !important;
      background-color: #ffffff !important;
      padding: 0 10px !important;
      height: 38px !important;
      display: flex !important;
      align-items: center !important;
    }

    .vditor-toolbar__item {
      padding: 4px 6px !important;
    }

    .vditor-content {
      background-color: var(--editor-bg) !important;
    }

    .vditor-ir {
      background-color: var(--editor-bg) !important;
    }

    .vditor-reset {
      font-family: 'JetBrains Mono', Consolas, monospace !important;
      font-size: 13.5px !important;
      line-height: 1.62 !important;
      color: var(--text-main) !important;
      padding: 20px 24px !important;
      background-color: var(--editor-bg) !important;
    }

    .vditor-counter {
      display: none !important;
    }

    .preview-stage {
      flex: 1;
      overflow: auto;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .sheet-wrap {
      width: 100%;
      max-width: 100%;
      display: flex;
      justify-content: center;
    }

    .preview-sheet {
      position: relative;
      width: 794px;
      min-height: 1123px;
      background-color: #ffffff;
      box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
      border-radius: 8px;
      padding: 60px 68px;
      box-sizing: border-box;
    }

    /* Watermark Preview Layers */
    .watermark-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      border-radius: 8px;
    }

    .watermark-layer[data-layer="over"] {
      z-index: 3;
    }

    .watermark-stamp {
      position: absolute;
      left: 0;
      top: 0;
      white-space: nowrap;
      transform-origin: left top;
      user-select: none;
    }

    .watermark-stamp-image {
      display: block;
      object-fit: contain;
    }

    /* Preview Sheet Themes */
    .preview-sheet[data-theme="paper"] {
      --doc-bg: #fffdf8;
      --doc-text: #182230;
      --doc-muted: #5c697e;
      --doc-line: rgba(148, 163, 184, 0.32);
      --doc-accent: #2a5bd7;
      --doc-code-bg: #f1f4f8;
      --doc-quote-bg: rgba(42, 91, 215, 0.08);
      background: var(--doc-bg);
      color: var(--doc-text);
    }

    .preview-sheet[data-theme="midnight"] {
      --doc-bg: #0f172a;
      --doc-text: #e8edf8;
      --doc-muted: #b4c0d6;
      --doc-line: rgba(148, 163, 184, 0.24);
      --doc-accent: #7aa2ff;
      --doc-code-bg: #162033;
      --doc-quote-bg: rgba(122, 162, 255, 0.12);
      background: var(--doc-bg);
      color: var(--doc-text);
    }

    .preview-sheet[data-theme="slate"] {
      --doc-bg: #f7fafc;
      --doc-text: #0f172a;
      --doc-muted: #516071;
      --doc-line: rgba(100, 116, 139, 0.24);
      --doc-accent: #0f766e;
      --doc-code-bg: #ecf5f4;
      --doc-quote-bg: rgba(15, 118, 110, 0.08);
      background: var(--doc-bg);
      color: var(--doc-text);
    }

    .preview-sheet[data-theme="sepia"] {
      --doc-bg: #fbf6ec;
      --doc-text: #2d2218;
      --doc-muted: #6d5c48;
      --doc-line: rgba(120, 98, 72, 0.24);
      --doc-accent: #9b5d2c;
      --doc-code-bg: #f4ede1;
      --doc-quote-bg: rgba(155, 93, 44, 0.08);
      background: var(--doc-bg);
      color: var(--doc-text);
    }

    /* Markdown Rendered Typography */
    .markdown-body {
      position: relative;
      z-index: 1;
      color: inherit;
      font-size: 14.5px;
      line-height: 1.75;
    }

    .markdown-body> :first-child {
      margin-top: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin: 1.5em 0 0.55em;
      line-height: 1.3;
      font-weight: 700;
      color: inherit;
    }

    .markdown-body h1 {
      font-size: 2.1rem;
      letter-spacing: -0.03em;
      margin-top: 0;
    }

    .markdown-body h2 {
      padding-bottom: 0.38em;
      border-bottom: 1px solid var(--doc-line);
      font-size: 1.4rem;
    }

    .markdown-body h3 {
      font-size: 1.15rem;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body pre,
    .markdown-body table,
    .markdown-body blockquote {
      margin: 0.9em 0;
    }

    .markdown-body a {
      color: var(--doc-accent);
      text-decoration: none;
    }

    .markdown-body strong {
      font-weight: 700;
    }

    .markdown-body hr {
      border: 0;
      border-top: 1px solid var(--doc-line);
      margin: 1.5em 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.4em;
    }

    .markdown-body li+li {
      margin-top: 0.3em;
    }

    .markdown-body input[type="checkbox"] {
      margin-right: 0.45em;
      vertical-align: middle;
    }

    .markdown-body code {
      padding: 0.12em 0.36em;
      border-radius: 4px;
      background: var(--doc-code-bg);
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 0.9em;
    }

    .markdown-body pre {
      overflow: auto;
      padding: 12px 14px;
      border-radius: 6px;
      background: var(--doc-code-bg);
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
    }

    .markdown-body blockquote {
      padding: 12px 16px;
      border-left: 4px solid var(--doc-accent);
      border-radius: 6px;
      background: var(--doc-quote-bg);
      color: var(--doc-muted);
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--doc-line);
      border-radius: 8px;
    }

    .markdown-body th,
    .markdown-body td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--doc-line);
      text-align: left;
      vertical-align: top;
    }

    .markdown-body thead th {
      font-size: 11px;
      color: var(--doc-muted);
      background: rgba(148, 163, 184, 0.08);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .markdown-body tbody tr:last-child td {
      border-bottom: 0;
    }

    .markdown-body img {
      max-width: 100%;
      border-radius: 6px;
    }

    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      inset: 0;
      padding: 40px;
      color: var(--text-light);
      text-align: center;
      pointer-events: none;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 14px;
      stroke: #cbd5e1;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 320px;
      line-height: 1.5;
    }

    .preview-sheet.is-empty .empty-state {
      display: flex;
    }

    .preview-sheet.is-empty .markdown-body {
      display: none;
    }

    /* Responsive Layout */
    @media (max-width: 1024px) {
      .workspace-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        max-height: 320px;
        border-right: 0;
        border-bottom: 1px solid var(--border-color);
      }

      .sidebar.collapsed {
        height: 0;
        max-height: 0;
        border-bottom-width: 0;
      }

      .main-content {
        flex-direction: column;
        flex: 1;
      }

      .editor-panel {
        border-right: 0;
        border-bottom: 1px solid var(--border-color);
        min-height: 250px;
      }

      .preview-panel {
        min-height: 400px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="../dist/dompdf.js"></script>
  <!-- Vditor Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/vditor/dist/index.min.js"></script>
</head>

<body>
  <div class="app-shell">
    <!-- Top Navigation Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          <span>dompdf.js</span>
        </div>
        <div class="divider"></div>
        <div class="app-title">
          <h1>Markdown 多主题编辑器</h1>
          <div class="status-container">
            <span id="status-dot" class="status-dot"></span>
            <span id="status" class="status-text">初始化中...</span>
          </div>
        </div>
      </div>

      <div class="header-right">
        <button id="copy-html-btn" class="btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" class="btn-icon">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />

      if (!dompdfApi) {

        copyHtmlBtnEl.disabled = true;

      markedApi.setOptions({
        gfm: true,

      function setStatus(message, isError) {
        statusEl.textContent = message;
        var dotEl = document.getElementById("status-dot");
        if (dotEl) {
          dotEl.className = isError ? "status-dot danger" : "status-dot";
        }

      function countWords(text) {
        var matches = text.trim().match(/[A-Za-z0-9_]+/g);
        return matches ? matches.length : 0;
      }

      function updateStats(text) {
        var normalized = text || "";
        charCountEl.textContent = normalized.length + " 字符";
        wordCountEl.textContent = countWords(normalized) + " 词";
        lineCountEl.textContent = normalized.split(/\r?\n/).length + " 行";
        themeIndicatorEl.textContent = "主题: " + themeLabels[activeTheme];
        pageCountEl.textContent =
          "约 " + Math.max(1, previewSheetEl.scrollHeight / 1123).toFixed(1) + " 页";
      }

      function sanitizeHtml(html) {
        return purifier.sanitize(html, {
          USE_PROFILES: { html: true },
        });
      }

      function renderMarkdownNow() {
        if (!vditor) return;
        var markdown = vditor.getValue();
        var html = markdown.trim() ? markedApi.parse(markdown) : "";
        previewEl.innerHTML = sanitizeHtml(html);
        previewSheetEl.classList.toggle("is-empty", !markdown.trim());
        updateStats(markdown);
        scheduleWatermarkPreview();
        setStatus("实时预览已更新。");
      }

      function scheduleRender() {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(renderMarkdownNow, 90);
      }

      function applyTheme(theme) {
        activeTheme = theme;
        previewSheetEl.setAttribute("data-theme", theme);
        themeIndicatorEl.textContent = "主题: " + themeLabels[theme];
        if (vditor) {
          updateStats(vditor.getValue());
        }
        scheduleWatermarkPreview();
      }

      function collectEncryptionOptions() {
        if (!enableEncryptionEl.checked) {
          return undefined;
        }
        var permissions = [];
        if (permPrintEl.checked) {
          permissions.push("print");
        }
        if (permCopyEl.checked) {
          permissions.push("copy");
        }
        if (permModifyEl.checked) {
          permissions.push("modify");
        }
        if (permAnnotEl.checked) {
          permissions.push("annot-forms");
        }
        return {
          userPassword: userPasswordEl.value,
          ownerPassword: ownerPasswordEl.value,
          userPermissions: permissions,
        };
      }

      function updateEncryptionUi() {
        var enabled = enableEncryptionEl.checked;
        encryptPanelEl.classList.toggle("is-disabled", !enabled);
        userPasswordEl.disabled = !enabled;
        ownerPasswordEl.disabled = !enabled;
        permPrintEl.disabled = !enabled;
        permCopyEl.disabled = !enabled;
        permModifyEl.disabled = !enabled;
        permAnnotEl.disabled = !enabled;

      function clampNumber(value, min, max, fallback) {
        var num = Number(value);
        if (!Number.isFinite(num)) return fallback;
        return Math.min(max, Math.max(min, num));
      }

      function collectWatermarkOptions() {
        if (!enableWatermarkEl.checked) {
          return undefined;
        }
        var opacity = clampNumber(watermarkOpacityEl.value, 0, 1, 0.12);
        var base = {
          angle: clampNumber(watermarkAngleEl.value, -180, 180, 35),
          spacing: [160, 120],
          offset: [36, 36],
          layer: watermarkLayerEl.value === "over" ? "over" : "under",
          excludePages: [1],
        };
        if (watermarkModeEl.value === "image") {
          if (!watermarkImageDataUrl) {
            return undefined;
          }
          var imageConfig = {
            imageUrl: watermarkImageDataUrl,
            opacity: opacity,
            angle: base.angle,
            spacing: base.spacing,
            offset: base.offset,
            layer: base.layer,
            excludePages: base.excludePages,
          };
          var imageWidth = Number(watermarkImageWidthEl.value);
          var imageHeight = Number(watermarkImageHeightEl.value);
          if (Number.isFinite(imageWidth) && imageWidth > 0) {
            imageConfig.imageWidth = clampNumber(imageWidth, 24, 1200, 180);
          }
          if (Number.isFinite(imageHeight) && imageHeight > 0) {
            imageConfig.imageHeight = clampNumber(imageHeight, 24, 1200, 180);
          }
          return imageConfig;

        var text = (watermarkTextEl.value || "").trim();
        if (!text) {
          return undefined;
        }
        return {
          text: text,
          color: "rgba(15, 23, 42, " + opacity + ")",
          fontFamily: "SourceHanSansSC-Regular",
          fontSize: clampNumber(watermarkFontSizeEl.value, 8, 72, 28),
          angle: base.angle,
          spacing: base.spacing,
          offset: base.offset,
          layer: base.layer,
          excludePages: base.excludePages,
        };
      }

      function loadWatermarkImageFile(file) {
        if (!file) {
          watermarkImageDataUrl = "";
          watermarkImageMeta = { width: 0, height: 0 };
          scheduleWatermarkPreview();
          return;
        }
        var reader = new FileReader();
        reader.onload = function () {
          var result = typeof reader.result === "string" ? reader.result : "";
          if (!result) {
            watermarkImageDataUrl = "";
            watermarkImageMeta = { width: 0, height: 0 };
            scheduleWatermarkPreview();
            return;
          }
          var img = new Image();
          img.onload = function () {
            watermarkImageDataUrl = result;
            watermarkImageMeta = {
              width: img.naturalWidth || img.width || 0,
              height: img.naturalHeight || img.height || 0,
            };
            scheduleWatermarkPreview();
          };
          img.onerror = function () {
            watermarkImageDataUrl = "";
            watermarkImageMeta = { width: 0, height: 0 };
            scheduleWatermarkPreview();
          };
          img.src = result;
        };
        reader.readAsDataURL(file);
      }

      function updateWatermarkUi() {
        var enabled = enableWatermarkEl.checked;
        var imageMode = enabled && watermarkModeEl.value === "image";
        var textMode = enabled && !imageMode;
        watermarkPanelEl.classList.toggle("is-disabled", !enabled);
        watermarkModeEl.disabled = !enabled;
        watermarkTextEl.disabled = !textMode;
        watermarkImageFileEl.disabled = !imageMode;
        watermarkImageWidthEl.disabled = !imageMode;
        watermarkImageHeightEl.disabled = !imageMode;
        watermarkAngleEl.disabled = !enabled;
        watermarkOpacityEl.disabled = !enabled;
        watermarkFontSizeEl.disabled = !textMode;
        watermarkLayerEl.disabled = !enabled;

        // Added CSS mode toggling
        watermarkPanelEl.classList.toggle("mode-text", watermarkModeEl.value === "text");
        watermarkPanelEl.classList.toggle("mode-image", watermarkModeEl.value === "image");

        scheduleWatermarkPreview();
      }

      function renderWatermarkPreviewNow() {
        var config = collectWatermarkOptions();
        var underEl = watermarkUnderLayerEl;
        var overEl = watermarkOverLayerEl;
        underEl.innerHTML = "";
        overEl.innerHTML = "";
        if (!config) {
          return;
        }

        var targetLayer = config.layer === "over" ? overEl : underEl;
        var sheetWidth = previewSheetEl.clientWidth || 794;
        var sheetHeight = Math.max(previewSheetEl.scrollHeight, 1123);
        var stepX = 160;
        var stepY = 120;
        targetLayer.style.height = sheetHeight + "px";
        var opacity = typeof config.opacity === "number"
          ? config.opacity
          : (function () {
            var opacityMatch = /rgba\([^,]+,[^,]+,[^,]+,\s*([0-9.]+)\)/.exec(config.color);
            return opacityMatch ? Number(opacityMatch[1]) : 0.12;
          })();

        for (var y = -sheetHeight; y < sheetHeight * 2; y += stepY) {
          for (var x = -sheetWidth; x < sheetWidth * 2; x += stepX) {
            var stamp = config.imageUrl
              ? document.createElement("img")
              : document.createElement("span");
            stamp.className = "watermark-stamp" + (config.imageUrl ? " watermark-stamp-image" : "");
            stamp.style.opacity = String(opacity);
            stamp.style.transform = "translate(" + x + "px, " + y + "px) rotate(" + config.angle + "deg)";
            if (config.imageUrl) {
              var previewWidth = Number(config.imageWidth) || 180;
              var previewHeight = Number(config.imageHeight)
                || (watermarkImageMeta.width > 0 && watermarkImageMeta.height > 0
                  ? previewWidth * watermarkImageMeta.height / watermarkImageMeta.width
                  : previewWidth);
              stamp.src = config.imageUrl;
              stamp.alt = "";
              stamp.draggable = false;
              stamp.style.width = previewWidth + "px";
              stamp.style.height = previewHeight + "px";
            } else {
              stamp.textContent = config.text;
              stamp.style.fontFamily = config.fontFamily;
              stamp.style.fontSize = config.fontSize + "px";
              stamp.style.color = "rgb(15, 23, 42)";
            }
            targetLayer.appendChild(stamp);
          }
        }
      }

      function scheduleWatermarkPreview() {
        clearTimeout(watermarkTimer);
        watermarkTimer = setTimeout(renderWatermarkPreviewNow, 80);
      }

      function currentExportOptions() {
        var previewStyle = window.getComputedStyle(previewSheetEl);
        return {
          format: "a4",
          pagination: true,
          marginPt: 0,
          useCORS: true,
          backgroundColor: previewStyle.backgroundColor || "#ffffff",
          fontConfig: sharedFontConfig.fontBytes ? sharedFontConfig : undefined,
          encryption: collectEncryptionOptions(),
          watermark: collectWatermarkOptions(),
          pageConfig: {
            excludePages: [1],
            header: {
              content: "Markdown Editor Demo · " + themeLabels[activeTheme],
              height: 42,
              contentPosition: "center",
              contentColor: previewStyle.color || "#334155",
              contentFontSize: 11,
              padding: [0, 0, 0, 0],
            },
            footer: {
              content: "第 ${currentPage} 页 / 共 ${totalPages} 页",
              height: 38,
              contentPosition: "center",
              contentColor: previewStyle.color || "#475569",
              contentFontSize: 10,
              padding: [0, 0, 0, 0],
            },
          },
        };
      }

      function withBusy(button, task) {
        var originalText = button.textContent;
        button.disabled = true;
        return Promise.resolve()
          .then(task)
          .finally(function () {
            button.disabled = false;
            button.textContent = originalText;
          });
      }

      function clonePreviewSheet() {
        var clone = previewSheetEl.cloneNode(true);
        var cloneUnder = clone.querySelector("#watermark-under-layer");
        var cloneOver = clone.querySelector("#watermark-over-layer");
        if (cloneUnder) {
          cloneUnder.remove();
        }
        if (cloneOver) {
          cloneOver.remove();
        }
        clone.style.position = "absolute";
        clone.style.left = "-9999px";
        clone.style.top = "-9999px";
        clone.style.display = "block";
        clone.style.margin = "0";
        document.body.appendChild(clone);
        return clone;
      }

      function downloadBlob(blob, filename) {
        var url = URL.createObjectURL(blob);
        var anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 2000);
      }

      function exportPdf() {
        if (!vditor) return Promise.resolve();
        var markdown = vditor.getValue();
        if (!markdown.trim()) {
          setStatus("请先输入一些 Markdown 内容。", true);
          return Promise.resolve();
        }
        return withBusy(exportBtnEl, function () {
          exportBtnEl.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon" style="animation: spin 1s linear infinite;">
                <line x1="12" y1="2" x2="12" y2="6"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
                <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
                <line x1="2" y1="12" x2="6" y2="12"/>
                <line x1="18" y1="12" x2="22" y2="12"/>
                <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
                <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
              </svg>
              <span>导出中...</span>
            `;
          setStatus(
            enableEncryptionEl.checked
              ? "正在将 HTML 预览导出为加密 PDF..."
              : "正在将 HTML 预览导出为 PDF...",
          );
          var clone = clonePreviewSheet();
          return dompdfApi(clone, currentExportOptions())
            .then(function (blob) {
              downloadBlob(blob, "markdown-editor-demo.pdf");
              setStatus(
                enableEncryptionEl.checked
                  ? "加密 PDF 导出完成。"
                  : "PDF 导出完成。",
              );
            })
            .finally(function () {
              if (clone.parentNode) {
                clone.parentNode.removeChild(clone);
              }
            });
        }).catch(function (error) {
          setStatus("PDF 导出失败: " + error.message, true);
          console.error(error);
        });
      }

      // Add simple spin animation styling for exporting state
      var style = document.createElement('style');
      style.type = 'text/css';
      style.innerHTML = '@keyframes spin { 100% { transform: rotate(360deg); } }';
      document.getElementsByTagName('head')[0].appendChild(style);

      function copyHtml() {
        return withBusy(copyHtmlBtnEl, function () {
          copyHtmlBtnEl.textContent = "复制中...";
          return navigator.clipboard
            .writeText(previewEl.innerHTML)
            .then(function () {
              setStatus("已复制当前渲染后的 HTML。");
            });
        }).catch(function (error) {
          setStatus("复制 HTML 失败: " + error.message, true);
          console.error(error);
        });
      }

      function loadSample(sampleKey) {
        var sample = samples[sampleKey];
        if (!sample) {
          return;
        }
        if (vditor) {
          vditor.setValue(sample);
        }
        renderMarkdownNow();
        setStatus("已载入示例内容。");
      }

      function loadFont() {
        return fetch("./SourceHanSansSC-Regular.ttf")
          .then(function (response) {
            if (!response.ok) {
              throw new Error("HTTP " + response.status);
            }
            return response.arrayBuffer();
          })
          .then(function (buffer) {
            sharedFontConfig.fontBytes = new Uint8Array(buffer);
            setStatus("已就绪，中文字体已加载。");
          })
          .catch(function (error) {
            setStatus("已就绪，但中文字体加载失败: " + error.message, true);
          });
      }

      themeSelectEl.addEventListener("change", function () {
        applyTheme(themeSelectEl.value);
      });
      enableEncryptionEl.addEventListener("change", updateEncryptionUi);
      enableWatermarkEl.addEventListener("change", updateWatermarkUi);
      watermarkModeEl.addEventListener("change", updateWatermarkUi);
      watermarkImageFileEl.addEventListener("change", function () {
        var file = watermarkImageFileEl.files && watermarkImageFileEl.files[0];
        var labelText = document.getElementById("file-upload-name");
        if (labelText) {
          labelText.textContent = file ? file.name : "选择图片文件...";
        }
        loadWatermarkImageFile(file);
      });
      watermarkImageWidthEl.addEventListener("input", scheduleWatermarkPreview);
      watermarkImageHeightEl.addEventListener("input", scheduleWatermarkPreview);
      watermarkTextEl.addEventListener("input", scheduleWatermarkPreview);
      watermarkAngleEl.addEventListener("input", scheduleWatermarkPreview);
      watermarkOpacityEl.addEventListener("input", scheduleWatermarkPreview);
      watermarkFontSizeEl.addEventListener("input", scheduleWatermarkPreview);
      watermarkLayerEl.addEventListener("change", scheduleWatermarkPreview);

      document
        .getElementById("load-sample-btn")
        .addEventListener("click", function () {
          loadSample(sampleSelectEl.value);
        });
      exportBtnEl.addEventListener("click", exportPdf);
      copyHtmlBtnEl.addEventListener("click", copyHtml);

      // Sidebar folding
      var sidebarEl = document.getElementById("settings-sidebar");
      var toggleSidebarBtn = document.getElementById("toggle-sidebar-btn");
      if (toggleSidebarBtn && sidebarEl) {
        toggleSidebarBtn.addEventListener("click", function () {
          sidebarEl.classList.toggle("collapsed");
        });
      }

      // Initialize Vditor in IR mode (Typora style)
      vditor = new Vditor('vditor-container', {
        mode: 'ir',
        height: '100%',
        placeholder: '在此开始输入 Markdown 内容...',
        cache: {
          enable: false
        },
        theme: 'classic',
        resize: {
          enable: false
        },
        toolbar: [
          'emoji', 'headings', 'bold', 'italic', 'strike', 'link', '|',
          'list', 'ordered-list', 'check', 'outdent', 'indent', '|',
          'quote', 'line', 'code', 'inline-code', '|',
          'table', 'undo', 'redo'
        ],
        input: function (val) {
          scheduleRender();
        },
        after: function () {
          loadSample(sampleSelectEl.value);
          loadFont();
        }
      });

      applyTheme(activeTheme);
      updateEncryptionUi();
      updateWatermarkUi();
    })();
  </script>
</body>

</html>
